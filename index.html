<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>himma 사옥 프로젝트 법규 검토</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Narrow:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Archivo Narrow', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    font-weight: 300;
  }

  .header {
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid #1e1e1e;
  }
  .header-left { line-height: 1.5; }
  .header-title {
    font-size: 13px;
    font-weight: 300;
    color: #c8b87a;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }
  .header-sub {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sheets-panel {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .sheets-panel input {
    background: transparent;
    border: none;
    border-bottom: 1px solid #2a2a2a;
    color: #fff;
    font-size: 11px;
    padding: 4px 0;
    font-family: inherit;
    font-weight: 300;
    outline: none;
    width: 260px;
    letter-spacing: 0.02em;
    transition: border-color 0.2s;
  }
  .sheets-panel input:focus { border-color: #c8b87a; color: #fff; }
  .sheets-panel input::placeholder { color: #aaa; }
  .btn-load {
    background: transparent; border: none;
    color: #c8b87a; font-size: 11px; font-family: inherit; font-weight: 300;
    cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 0; transition: color 0.2s;
  }
  .btn-load:hover { color: #fff; }
  .btn-sample {
    background: transparent; border: none;
    color: #aaa; font-size: 11px; font-family: inherit; font-weight: 300;
    cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 0; transition: color 0.2s;
  }
  .btn-sample:hover { color: #fff; }

  .container { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2.5rem; }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 2.5rem;
    font-size: 11px; color: #aaa;
    letter-spacing: 0.06em; text-transform: uppercase;
    min-height: 18px;
  }
  .status-dot { width: 4px; height: 4px; border-radius: 50%; background: #2a2a2a; flex-shrink: 0; }
  .status-dot.ok { background: #c8b87a; }
  .status-dot.error { background: #773333; }
  .status-dot.loading { background: #c8b87a; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.15} }

  .tabs {
    display: flex;
    gap: 2.5rem;
    margin-bottom: 3rem;
    border-bottom: 1px solid #161616;
  }
  .tab-btn {
    background: transparent; border: none;
    border-bottom: 1px solid transparent;
    color: #aaa;
    font-size: 13px; font-family: inherit; font-weight: 300;
    letter-spacing: 0.06em;
    cursor: pointer;
    padding: 0 0 1rem 0;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color: #fff; }
  .tab-btn.active { color: #c8b87a; border-bottom-color: #c8b87a; }

  .section { display: none; }
  .section.active { display: block; }

  .era-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 1px;
    background: #161616;
    margin-bottom: 4rem;
  }
  .era-card {
    background: #0a0a0a;
    padding: 2.5rem 2rem;
  }
  .era-label {
    font-size: 11px; font-weight: 300;
    letter-spacing: 0.14em; text-transform: uppercase;
    display: block; margin-bottom: 2rem;
  }
  .era-1990 .era-label { color: #c8b87a; }
  .era-2014 .era-label { color: #6677aa; }
  .era-current .era-label { color: #aaa; }

  .era-title {
    font-size: 20px; font-weight: 300;
    color: #fff; letter-spacing: -0.01em;
    line-height: 1.4; text-transform: none;
    margin-bottom: 1.8rem;
  }
  .era-content {
    font-size: 14px; font-weight: 300;
    color: #fff; line-height: 2.2;
    white-space: pre-wrap;
  }
  .law-ref {
    font-size: 11px; color: #aaa;
    margin-top: 2rem; padding-top: 1.5rem;
    border-top: 1px solid #161616;
    line-height: 1.9; letter-spacing: 0.02em;
  }

  .links-section { margin-top: 0; }
  .links-title {
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #aaa; margin-bottom: 1.5rem;
  }
  .link-item {
    display: flex; align-items: baseline; gap: 2rem;
    padding: 1rem 0;
    border-bottom: 1px solid #111;
  }
  .link-item:last-child { border-bottom: none; }
  .link-badge {
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.1em; text-transform: uppercase;
    white-space: nowrap; flex-shrink: 0; width: 32px;
  }
  .badge-법령 { color: #c8b87a; }
  .badge-연혁 { color: #6677aa; }
  .badge-해설 { color: #556644; }
  .link-info { flex: 1; display: flex; align-items: baseline; gap: 2rem; flex-wrap: wrap; }
  .link-name {
    font-size: 12px; font-weight: 300; color: #fff;
    text-decoration: none; letter-spacing: 0.02em;
    transition: color 0.2s;
  }
  .link-name:hover { color: #c8b87a; }
  .link-desc { font-size: 11px; color: #aaa; letter-spacing: 0.02em; }

  .notice {
    margin-top: 3rem; padding-top: 2rem;
    border-top: 1px solid #161616;
    font-size: 11px; color: #aaa;
    line-height: 2; letter-spacing: 0.02em;
  }

  .guide-box {
    border: 1px solid #1a1a1a;
    padding: 1.5rem 2rem; margin-bottom: 2rem;
  }
  .guide-box h3 {
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: #c8b87a; margin-bottom: 1rem;
  }
  .guide-box ol {
    padding-left: 1.2rem; font-size: 12px; font-weight: 300;
    color: #fff; line-height: 2.2; letter-spacing: 0.02em;
  }
  .guide-box code { color: #c8b87a; font-family: monospace; font-size: 11px; }
  .guide-box a { color: #fff; text-decoration: none; }
  .guide-box a:hover { color: #c8b87a; }

  @media (max-width: 768px) {
    .header { padding: 1.5rem; flex-direction: column; gap: 1.2rem; }
    .container { padding: 2rem 1.5rem; }
    .era-grid { grid-template-columns: 1fr; }
    .tabs { gap: 1.5rem; overflow-x: auto; white-space: nowrap; }
    .sheets-panel { width: 100%; }
    .sheets-panel input { width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="himma LOGO_White.png" style="height:90px; width:auto;" alt="himma" />
  </div>
  <div class="sheets-panel">
    <input type="text" id="sheetUrl" placeholder="google sheets csv url" />
    <button class="btn-load" onclick="loadFromSheet()">Load</button>
  </div>
</div>

<div class="container">

  <div class="guide-box" id="guideBox" style="display:none;">
    <h3>Google Sheets 연동</h3>
    <ol>
      <li>구글 시트 → <code>파일 → 공유 → 웹에 게시</code></li>
      <li>형식: <code>CSV</code> 선택 후 게시</li>
      <li>생성된 URL을 상단 입력창에 붙여넣고 <code>Load</code></li>
    </ol>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText"></span>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('sunlight', this)">일조사선</button>
    <button class="tab-btn" onclick="showTab('basement', this)">지하층 판정</button>
    <button class="tab-btn" onclick="showTab('area', this)">건축 면적</button>
    <button class="tab-btn" onclick="showTab('height', this)">건축물 높이</button>
  </div>

  <div id="sunlight" class="section active"><div class="era-grid" id="grid-sunlight"></div></div>
  <div id="basement" class="section"><div class="era-grid" id="grid-basement"></div></div>
  <div id="area" class="section"><div class="era-grid" id="grid-area"></div></div>
  <div id="height" class="section"><div class="era-grid" id="grid-height"></div></div>

  <div class="links-section">
    <div class="links-title">참고 및 출처</div>
    <div id="linksList"></div>
  </div>

  <div class="notice">
    1990년대 기준은 당시 건축허가 시점의 조문이 적용됩니다.
    실제 설계·준공 연도에 따라 적용 법령이 다를 수 있으므로,
    국가법령정보센터에서 해당 시점의 연혁 조문을 반드시 확인하세요.
  </div>
</div>

<script>
function showTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (!inQ && c === ',') { row.push(cell.trim()); cell = ''; continue; }
    if (!inQ && (c === '\n' || (c === '\r' && text[i+1] === '\n'))) {
      if (c === '\r') i++;
      row.push(cell.trim()); rows.push(row); row = []; cell = '';
      continue;
    }
    cell += c;
  }
  if (cell || row.length) { row.push(cell.trim()); rows.push(row); }
  return rows;
}

function makeCard(eraClass, label, title, content, lawRef) {
  return `<div class="era-card ${eraClass}">
    <span class="era-label">${label}</span>
    <div class="era-title">${title}</div>
    <div class="era-content">${content}</div>
    <div class="law-ref">${lawRef}</div>
  </div>`;
}

const TOPIC_MAP = { '일조사선':'sunlight','지하층판정':'basement','건축면적':'area','건축물높이':'height' };
const ERA_CLASS = { '1990년대':'era-1990','2014년':'era-2014','현행':'era-current' };

function renderLaw(rows) {
  const grids = { sunlight:'', basement:'', area:'', height:'' };
  rows.forEach(r => {
    if (r.length < 5 || r[0] === '법규항목') return;
    const topic = r[0].replace(/\s/g, '');
    const gridKey = TOPIC_MAP[topic];
    if (!gridKey) return;
    grids[gridKey] += makeCard(ERA_CLASS[r[1].trim()] || 'era-current', r[1], r[2], r[3], r[4]);
  });
  Object.keys(grids).forEach(k => {
    const el = document.getElementById('grid-' + k);
    if (el) el.innerHTML = grids[k] || '<p style="color:#aaa;font-size:12px;padding:2rem;">데이터 없음</p>';
  });
}

function renderLinks(rows) {
  const list = document.getElementById('linksList');
  let html = '';
  rows.forEach(r => {
    if (r.length < 5 || r[0] !== 'LINK') return;
    html += `<div class="link-item">
      <span class="link-badge badge-${r[1].trim()}">${r[1]}</span>
      <div class="link-info">
        <a class="link-name" href="${r[3]}" target="_blank">${r[2]}</a>
        <span class="link-desc">${r[4]}</span>
      </div>
    </div>`;
  });
  list.innerHTML = html || '<p style="color:#aaa;font-size:12px;padding:1rem 0;">링크 없음</p>';
}

function setStatus(state, msg) {
  document.getElementById('statusDot').className = 'status-dot ' + state;
  document.getElementById('statusText').textContent = msg;
}

async function loadFromSheet() {
  const url = document.getElementById('sheetUrl').value.trim();
  if (!url) { alert('URL을 입력해주세요.'); return; }
  setStatus('loading', 'loading...');
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('network error');
    const rows = parseCSV(await res.text());
    renderLaw(rows); renderLinks(rows);
    setStatus('ok', 'loaded from sheets');
  } catch(e) {
    setStatus('error', 'failed — ' + e.message);
    document.getElementById('guideBox').style.display = 'block';
  }
}

function loadSample() {
  setStatus('ok', 'sample data');
  const sample = [
    ['법규항목','시대구분','제목','내용','법령근거'],
    ['일조사선','1990년대','정북방향 일조 사선 제한','전용·일반주거지역에서\n높이 8m 이하 부분:\n인접대지경계선으로부터 1.5m 이상\n\n높이 8m 초과 부분:\n각 부분 높이의 1/2 이상 이격\n\n도로사선제한도 병행 적용\n(전면도로 폭 기준 1.5배 이하)','건축법 시행령 제86조 (1992년 개정 기준) / 구 건축법 제41조'],
    ['일조사선','2014년','정북방향 일조 사선 제한','전용·일반주거지역에서\n높이 9m 이하 부분:\n인접대지경계선으로부터 1.5m 이상\n\n높이 9m 초과 부분:\n각 부분 높이의 1/2 이상 이격\n\n도로사선제한 여전히 적용 (2015년 폐지 前)','건축법 시행령 제86조 (2012.12 개정, 9m 상향)'],
    ['일조사선','현행','정북방향 일조 사선 제한','전용·일반주거지역에서\n높이 10m 이하 부분:\n인접대지경계선으로부터 1.5m 이상\n\n높이 10m 초과 부분:\n각 부분 높이의 1/2 이상 이격\n\n도로사선제한 폐지 (2015년~)\n각 시·군·구 조례 별도 확인 필요','건축법 제61조 / 시행령 제86조 (2023.9.12 개정)'],
    ['지하층판정','1990년대','지하층 판정 기준','1973~1999년 기간:\n층 높이의 2/3 이상이 지표면 아래에 있어야 지하층으로 인정\n\n단, 단독주택·다세대주택은\n1984년부터 1/2 이상으로 완화 적용\n\n지표면 산정: 가중평균 방식','구 건축법 제2조 제1항 제4호 / 시행령 (1984년·1992년 개정)'],
    ['지하층판정','2014년','지하층 판정 기준','1999.5.9 이후 통일된 기준:\n층 높이의 1/2 이상이 지표면 아래에 있으면 지하층으로 인정\n\n용도에 관계없이 모든 건축물에 동일 적용\n\n지표면: 각 지표면 높이의 수평거리 가중평균','건축법 제2조 제1항 제5호 / 시행령 제119조 제10호'],

    ['건축면적','1990년대','건축면적 산정','외벽 중심선으로 둘러싸인 수평투영면적\n\n지표면으로부터 1m 이하 부분 제외\n\n처마·차양·부연 등이 외벽 중심선으로부터 1m 이상 돌출 시\n→ 끝단에서 1m 후퇴한 선 기준\n\n(창고 3m, 한옥 2m 기준 적용)','구 건축법 시행령 제119조 제2호 (1992~1995년 기준)'],
    ['건축면적','2014년','건축면적 산정','외벽 중심선으로 둘러싸인 수평투영면적\n\n지표면으로부터 1m 이하 부분 제외\n\n처마·차양 등 1m 이상 돌출 시 끝단에서 1m 후퇴\n\n발코니: 단독·공동주택은 외벽 중심선 기준\n(2005년 발코니 확장 합법화 이후 기준 정비)','건축법 시행령 제119조 제1항 제2호'],

window.onload = async () => {
  const saved = localStorage.getItem('buildingLawSheetUrl');
  if (saved) {
    document.getElementById('sheetUrl').value = saved;
    setStatus('loading', 'loading...');
    try {
      const res = await fetch(saved);
      if (!res.ok) throw new Error('not found');
      const rows = parseCSV(await res.text());
      renderLaw(rows); renderLinks(rows);
      setStatus('ok', 'loaded from sheets');
      return;
    } catch(e) {}
  }
  setStatus('', '');
  loadSample();
};

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('sheetUrl');
  if (input) {
    input.addEventListener('change', e => {
      localStorage.setItem('buildingLawSheetUrl', e.target.value);
    });
  }
});
</script>
